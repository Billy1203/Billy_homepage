---
layout: compress

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js" data-language="en" data-default-language="en">
  <head>
    <script>
      (function() {
        try {
          if (window.localStorage.getItem("site-language") === "zh") {
            document.documentElement.setAttribute("data-language", "zh");
            document.documentElement.lang = "zh-CN";
          }
        } catch (error) {}
      })();
    </script>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

  </body>
</html>
