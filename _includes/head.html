{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  (function() {
    var storedTheme = null;
    var storedFontPreset = null;
    try {
      storedTheme = localStorage.getItem('theme');
      storedFontPreset = localStorage.getItem('font-preset');
    } catch (error) {
      storedTheme = null;
      storedFontPreset = null;
    }

    if (storedTheme !== 'dark' && storedTheme !== 'light' && storedTheme !== 'system') {
      storedTheme = 'system';
    }

    var theme = storedTheme;
    if (theme === 'system') {
      theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    document.documentElement.style.colorScheme = theme;

    if (storedFontPreset && storedFontPreset !== 'default') {
      document.documentElement.setAttribute('data-font-preset', storedFontPreset);
    } else {
      document.documentElement.removeAttribute('data-font-preset');
    }
  })();
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css?v={{ site.time | date: '%s' }}">

<meta http-equiv="cleartype" content="on">
