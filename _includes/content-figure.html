{% assign figure_class = include.class | default: "publication-figure" %}
{% assign figure_alt = include.alt | default: "" %}

<figure class="{{ figure_class }}">
  <img src="{{ include.src }}" alt="{{ figure_alt }}" decoding="async">
  {% if include.caption_en or include.caption_zh %}
    <figcaption>
      {% include i18n-text.html en=include.caption_en zh=include.caption_zh %}
    </figcaption>
  {% endif %}
</figure>
