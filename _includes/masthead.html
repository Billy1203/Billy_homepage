{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav" aria-label="Primary navigation">
        <div class="greedy-nav__brand{% if page.url == '/' or page.url == '/index.html' %} selected{% endif %}">
          <a href="{{ base_path }}/">{{ site.title }}</a>
        </div>
        <div class="greedy-nav__primary">
          <ul class="greedy-nav__links">
            {% for link in site.data.navigation.main %}
              {% if link.url contains 'http' %}
                {% assign domain = '' %}
              {% else %}
                {% assign domain = base_path %}
              {% endif %}
              <li class="greedy-nav__item{% if page.url contains link.url and link.url != '/' %} selected{% endif %}">
                <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
              </li>
            {% endfor %}
          </ul>
          <button type="button" class="greedy-nav__toggle is-hidden" aria-label="Open navigation menu" aria-expanded="false" aria-controls="site-nav-overflow" data-count="0">
            <span class="greedy-nav__toggle-label">Menu</span>
            <span class="navicon" aria-hidden="true"></span>
          </button>
          <ul id="site-nav-overflow" class="greedy-nav__hidden-links is-hidden"></ul>
        </div>
        <div id="theme-toggle" class="greedy-nav__theme">
          <a href="#" role="button" aria-label="Toggle color theme">
            <i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true"></i>
          </a>
        </div>
      </nav>
    </div>
  </div>
</div>
